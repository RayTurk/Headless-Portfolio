[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_USE_NETLIFY_EDGE = "true"

# Next.js plugin for Netlify (handles ISR, image optimization, etc.)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect www to non-www
[[redirects]]
  from = "https://www.rturk.me/*"
  to = "https://rturk.me/:splat"
  status = 301
  force = true

# Redirect legacy WordPress paths from the old site
[[redirects]]
  from = "/feed"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/feed/"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/category/*"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/tag/*"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/author/*"
  to = "/about"
  status = 301

[[redirects]]
  from = "/wp-json/*"
  to = "/"
  status = 410

[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 410

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
